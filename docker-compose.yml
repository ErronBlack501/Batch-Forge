services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: batch-forge-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/batch-forge
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - batch-forge-net
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  redis:
    image: redis:7-alpine
    container_name: batch-forge-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - batch-forge-net
    volumes:
      - redis_data:/data
    restart: unless-stopped

  mongo:
    image: mongo:7.0.34-jammy
    container_name: batch-forge-mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=batch-forge
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - batch-forge-net
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:main-distroless
    container_name: batch-forge-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - api
    networks:
      - batch-forge-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana-enterprise
    container_name: batch-forge-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - batch-forge-net
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

networks:
  batch-forge-net:
    driver: bridge

volumes:
  redis_data:
  mongo_data:
  prometheus_data:
  grafana_data: